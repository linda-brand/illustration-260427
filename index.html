<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 데이터 시각화 도구</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; padding-bottom: 50px; }
        .container { max-width: 800px; margin-top: 30px; }
        .step-card { border-radius: 15px; margin-bottom: 20px; overflow: hidden; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .step-header { padding: 15px 20px; color: white; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        /* 단계별 색상 */
        .step-1 { border-left: 10px solid #0d6efd; } .step-1 .step-header { background-color: #0d6efd; }
        .step-2 { border-left: 10px solid #212529; } .step-2 .step-header { background-color: #212529; }
        .step-3 { border-left: 10px solid #dc3545; } .step-3 .step-header { background-color: #dc3545; }
        .step-4 { border-left: 10px solid #198754; } .step-4 .step-header { background-color: #198754; }

        .step-body { padding: 20px; background-color: white; display: none; }
        .active .step-body { display: block; }
        
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
        th { background-color: #f1f3f5; }
        [contenteditable]:focus { outline: 2px solid #0d6efd; background-color: #fff; }
        
        .chart-container { position: relative; height: 40vh; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">📊 데이터 시각화 웹앱</h2>

    <div class="step-card step-1 active" id="step1">
        <div class="step-header" onclick="toggleStep('step1')">
            <span>✍️ 1) 입력</span>
            <span>▼</span>
        </div>
        <div class="step-body">
            <h6>🤖 제미나이 데이터 자동 입력</h6>
            <p class="text-muted small">데이터(CSV 또는 표 형태)를 아래에 붙여넣으세요.</p>
            <textarea id="csvInput" class="form-control" rows="5" placeholder="연도,가격&#10;2021,1000&#10;2022,1200&#10;2023,1100"></textarea>
            <button class="btn btn-primary w-100 mt-3" onclick="parseData()">🪄 AI 데이터 자동 완성하기</button>
        </div>
    </div>

    <div class="step-card step-2" id="step2">
        <div class="step-header" onclick="toggleStep('step2')">
            <span>📊 2) 데이터수정</span>
            <span>▼</span>
        </div>
        <div class="step-body">
            <p class="text-muted small">표의 셀을 클릭하여 값을 직접 수정할 수 있습니다.</p>
            <div class="table-responsive">
                <table id="dataTable">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button class="btn btn-dark btn-sm mt-2" onclick="addRow()">+ 행 추가</button>
        </div>
    </div>

    <div class="step-card step-3" id="step3">
        <div class="step-header" onclick="toggleStep('step3')">
            <span>🎨 3) 디자인</span>
            <span>▼</span>
        </div>
        <div class="step-body">
            <div class="row">
                <div class="col-6">
                    <label class="form-label">그래프 종류</label>
                    <select id="chartType" class="form-select">
                        <option value="line">선 그래프</option>
                        <option value="bar">막대 그래프</option>
                        <option value="pie">원 그래프</option>
                        <option value="scatter">산점도</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label">값 선택(Y축)</label>
                    <select id="yAxis" class="form-select"></select>
                </div>
            </div>
            <button class="btn btn-danger w-100 mt-3" onclick="drawChart()">그래프 그리기</button>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>

    <div class="step-card step-4" id="step4">
        <div class="step-header" onclick="toggleStep('step4')">
            <span>💾 4) 저장</span>
            <span>▼</span>
        </div>
        <div class="step-body text-center">
            <button class="btn btn-success me-2" onclick="downloadCSV()">📥 데이터(CSV) 다운로드</button>
            <button class="btn btn-outline-success" onclick="downloadImage()">🖼️ 그래프 이미지 저장</button>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let headers = [];
    let myChart = null;

    // 단계 접기/펴기 함수
    function toggleStep(id) {
        document.getElementById(id).classList.toggle('active');
    }

    // 1단계: 데이터 파싱
    function parseData() {
        const input = document.getElementById('csvInput').value;
        const rows = input.trim().split('\n');
        if (rows.length < 2) return alert("데이터 형식이 올바르지 않습니다.");

        headers = rows[0].split(',').map(h => h.trim());
        rawData = rows.slice(1).map(row => row.split(',').map(v => v.trim()));

        renderTable();
        updateSelects();
        document.getElementById('step2').classList.add('active');
        alert("데이터가 로드되었습니다!");
    }

    // 2단계: 테이블 그리기 (에디터 기능)
    function renderTable() {
        const headerRow = document.getElementById('tableHeader');
        const bodyRows = document.getElementById('tableBody');
        
        headerRow.innerHTML = headers.map(h => `<th>${h}</th>`).join('');
        bodyRows.innerHTML = rawData.map((row, idx) => `
            <tr>
                ${row.map((cell, cIdx) => `<td contenteditable="true" onblur="updateCell(${idx}, ${cIdx}, this)">${cell}</td>`).join('')}
            </tr>
        `).join('');
    }

    function updateCell(r, c, el) {
        rawData[r][c] = el.innerText;
    }

    function addRow() {
        rawData.push(new Array(headers.length).fill('0'));
        renderTable();
    }

    function updateSelects() {
        const ySelect = document.getElementById('yAxis');
        ySelect.innerHTML = headers.map((h, i) => `<option value="${i}">${h}</option>`).join('');
    }

    // 3단계: 그래프 그리기 (Chart.js)
    function drawChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const type = document.getElementById('chartType').value;
        const yIdx = document.getElementById('yAxis').value;

        if (myChart) myChart.destroy();

        const labels = rawData.map(row => row[0]); // 첫 번째 열을 X축 라벨로 사용
        const dataValues = rawData.map(row => parseFloat(row[yIdx]) || 0);

        myChart = new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: headers[yIdx],
                    data: dataValues,
                    backgroundColor: ['#0d6efd', '#ffc107', '#198754', '#dc3545', '#6610f2'],
                    borderColor: '#0d6efd',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }

    // 4단계: 다운로드 기능
    function downloadCSV() {
        let csvContent = headers.join(',') + '\n' + rawData.map(r => r.join(',')).join('\n');
        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "data.csv";
        link.click();
    }

    function downloadImage() {
        const link = document.createElement("a");
        link.href = document.getElementById('myChart').toDataURL("image/png");
        link.download = "chart.png";
        link.click();
    }
</script>

</body>
</html>
